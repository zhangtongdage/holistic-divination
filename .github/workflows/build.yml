 name: Build Desktop App

    on:
      push:
        tags:
          - 'v*'
      workflow_dispatch:

    permissions:
      contents: write

    jobs:
      build:
        strategy:
          fail-fast: false
          matrix:
            include:
              - platform: ubuntu-22.04
                target: x86_64-unknown-linux-gnu
              - platform: windows-latest
                target: x86_64-pc-windows-msvc
              - platform: macos-latest
                target: aarch64-apple-darwin

        runs-on: ${{ matrix.platform }}

        steps:
          - name: Checkout
            uses: actions/checkout@v4

          - name: Setup Node.js
            uses: actions/setup-node@v4
            with:
              node-version: '20'

          - name: Install Rust stable
            uses: dtolnay/rust-toolchain@stable
            with:
              targets: ${{ matrix.target }}

          - name: Install Linux dependencies
            if: matrix.platform == 'ubuntu-22.04'
            run: |
              sudo apt-get update
              sudo apt-get install -y webkit2gtk-4.1 libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

          - name: Install frontend dependencies
            run: cd desktop && npm install

          - name: Build frontend
            run: cd desktop && npm run build

          - name: Build Tauri app
            uses: tauri-apps/tauri-action@v0
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            with:
              tauriScript: npx tauri
              args: --target ${{ matrix.target }}

          - name: Upload artifacts
            uses: actions/upload-artifact@v4
            with:
              name: release-${{ matrix.target }}
              path: |
                desktop/src-tauri/target//release/bundle//.deb
                desktop/src-tauri/target//release/bundle//.AppImage
                desktop/src-tauri/target//release/bundle//.dmg
                desktop/src-tauri/target//release/bundle/nsis//
                desktop/src-tauri/target//release/bundle//.exe

      release:
        needs: build
        runs-on: ubuntu-latest
        if: startsWith(github.ref, 'refs/tags/')

        steps:
          - name: Download artifacts
            uses: actions/download-artifact@v4
            with:
              path: artifacts
              merge-multiple: true

          - name: Create release
            uses: softprops/action-gh-release@v1
            with:
              files: |
                artifacts/*/.deb
                artifacts/*/.AppImage
                artifacts/*/.dmg
                artifacts/*/.nsis
                artifacts/*/.exe
              draft: true
              generate_release_notes: true
